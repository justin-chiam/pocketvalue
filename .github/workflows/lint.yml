name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    strategy:
      matrix:
        app: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.app }}
      - run: npm run lint
        working-directory: ${{ matrix.app }}
